name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions: write-all

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  CODEX_APP_SERVER_REPO: nevermorewish/codex
  CODEX_APP_SERVER_RELEASE_TAG: codex-app-server-v0.1.0
  CLAUDE_MEM_REPO: nevermorewish/claude-mem
  CLAUDE_MEM_RELEASE_TAG: v13.2.0

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  # ── Validate tag matches package.json version ──────────
  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag vs package.json
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG_VERSION="v$(jq -r .version package.json)"
          if [[ "$TAG" != "$PKG_VERSION" ]]; then
            echo "❌ Tag $TAG does not match package.json $PKG_VERSION"
            exit 1
          fi
          echo "✅ Version $TAG is consistent"

  # ── Generate release notes via git-cliff ─────────────
  draft-release-notes:
    name: Generate Release Notes
    needs: [check-version]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      body: ${{ steps.cliff.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          CLIFF_REPO: ${{ github.repository }}

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'FrogClaw ${{ github.ref_name }}'
          body: ${{ steps.cliff.outputs.content }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── Build for macOS / Windows / Linux x86_64 ───────────
  release:
    name: Build (${{ matrix.target }})
    needs: [check-version, draft-release-notes]
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
          # Linux x86_64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: 'v1'
          key: '${{ matrix.os }}-${{ matrix.target }}'
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install x86_64 OpenSSL (macOS Intel cross-compile)
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          arch -x86_64 brew install openssl@3
          echo "OPENSSL_DIR=$(arch -x86_64 brew --prefix openssl@3)" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$(arch -x86_64 brew --prefix openssl@3)/include" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$(arch -x86_64 brew --prefix openssl@3)/lib" >> $GITHUB_ENV

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get linked dependency versions
        id: dep-versions
        shell: bash
        run: |
          SM_SHA=$(git -C libs/stream-monaco rev-parse HEAD)
          MS_SHA=$(git -C libs/markstream-vue rev-parse HEAD)
          echo "cache-key=${{ runner.os }}-${{ matrix.target }}-linked-deps-${SM_SHA:0:12}-${MS_SHA:0:12}" >> $GITHUB_OUTPUT

      - name: Cache linked dependencies
        id: cache-linked-deps
        uses: actions/cache@v4
        with:
          path: |
            libs/stream-monaco/node_modules
            libs/stream-monaco/dist
            libs/markstream-vue/node_modules
            libs/markstream-vue/packages/markdown-parser/node_modules
            libs/markstream-vue/packages/markdown-parser/dist
            libs/markstream-vue/packages/markstream-react/node_modules
            libs/markstream-vue/packages/markstream-react/dist
          key: ${{ steps.dep-versions.outputs.cache-key }}

      - name: Build linked dependencies
        if: steps.cache-linked-deps.outputs.cache-hit != 'true'
        shell: bash
        run: |
          pnpm --dir libs/stream-monaco install --frozen-lockfile
          pnpm --dir libs/stream-monaco build

          pnpm --dir libs/markstream-vue install --frozen-lockfile
          pnpm --dir libs/markstream-vue run build:parser
          pnpm --dir libs/markstream-vue/packages/markstream-react build

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Codex app-server resource
        run: node scripts/prepare-codex-app-server.mjs ${{ matrix.target }}

      - name: Prepare claude-mem resource
        run: node scripts/prepare-claude-mem.mjs ${{ matrix.target }}

      - name: Verify claude-mem source resource
        if: contains(matrix.target, 'windows')
        shell: pwsh
        run: |
          $exe = "src-tauri/binaries/claude-mem.exe"
          $worker = "src-tauri/binaries/plugin/scripts/worker-service.cjs"
          if (!(Test-Path -LiteralPath $exe)) {
            throw "Missing prepared claude-mem executable: $exe"
          }
          if ((Get-Item -LiteralPath $exe).Length -le 0) {
            throw "Prepared claude-mem executable is empty: $exe"
          }
          if (!(Test-Path -LiteralPath $worker)) {
            throw "Missing prepared claude-mem plugin worker: $worker"
          }

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.os == 'macos-latest' && '-' || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'FrogClaw ${{ github.ref_name }}'
          releaseBody: ${{ needs.draft-release-notes.outputs.body }}
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }}
          includeUpdaterJson: true

      - name: Verify claude-mem bundled resource
        if: contains(matrix.target, 'windows')
        shell: pwsh
        run: |
          $releaseDir = "src-tauri/target/${{ matrix.target }}/release"
          $exe = Join-Path $releaseDir "binaries/claude-mem.exe"
          $worker = Join-Path $releaseDir "binaries/plugin/scripts/worker-service.cjs"
          if (!(Test-Path -LiteralPath $exe)) {
            Get-ChildItem -LiteralPath $releaseDir -Recurse -Filter "claude-mem.exe" -ErrorAction SilentlyContinue | Select-Object FullName,Length | Format-Table -AutoSize
            throw "Missing bundled claude-mem executable: $exe"
          }
          if ((Get-Item -LiteralPath $exe).Length -le 0) {
            throw "Bundled claude-mem executable is empty: $exe"
          }
          if (!(Test-Path -LiteralPath $worker)) {
            throw "Missing bundled claude-mem plugin worker: $worker"
          }

      - name: Verify claude-mem NSIS installer payload
        if: contains(matrix.target, 'windows')
        shell: pwsh
        run: |
          $releaseDir = "src-tauri/target/${{ matrix.target }}/release"
          $installers = Get-ChildItem -LiteralPath (Join-Path $releaseDir "bundle/nsis") -Filter "*setup.exe" -ErrorAction SilentlyContinue
          if (!$installers) {
            throw "No NSIS setup.exe found under $releaseDir"
          }
          foreach ($installer in $installers) {
            $stage = Join-Path $env:RUNNER_TEMP ("frogclaw-nsis-check-" + $installer.BaseName)
            Remove-Item -LiteralPath $stage -Recurse -Force -ErrorAction SilentlyContinue
            New-Item -ItemType Directory -Path $stage | Out-Null
            & 7z x "-o$stage" $installer.FullName -y | Out-Host
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to extract NSIS installer for verification: $($installer.FullName)"
            }
            $nestedArchives = Get-ChildItem -LiteralPath $stage -Recurse -Include *.7z,*.zip -ErrorAction SilentlyContinue
            foreach ($archive in $nestedArchives) {
              $nestedStage = Join-Path $archive.DirectoryName $archive.BaseName
              New-Item -ItemType Directory -Path $nestedStage -Force | Out-Null
              & 7z x "-o$nestedStage" $archive.FullName -y | Out-Host
              if ($LASTEXITCODE -ne 0) {
                throw "Failed to extract nested installer payload: $($archive.FullName)"
              }
            }
            $exe = Get-ChildItem -LiteralPath $stage -Recurse -Filter "claude-mem.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            $worker = Get-ChildItem -LiteralPath $stage -Recurse -Filter "worker-service.cjs" -ErrorAction SilentlyContinue | Select-Object -First 1
            if (!$exe) {
              throw "NSIS installer is missing claude-mem.exe: $($installer.FullName)"
            }
            if (!$worker) {
              throw "NSIS installer is missing claude-mem plugin worker: $($installer.FullName)"
            }
          }

      - name: Package Windows portable (zip)
        if: contains(matrix.target, 'windows')
        shell: pwsh
        run: |
          $releaseDir = "src-tauri/target/${{ matrix.target }}/release"
          $exe = Join-Path $releaseDir "FrogClaw.exe"
          $resources = Join-Path $releaseDir "binaries"
          $arch = if ("${{ matrix.target }}" -match "aarch64") { "arm64" } else { "x64" }
          $zipName = "FrogClaw_${{ github.ref_name }}_windows-${arch}-portable.zip"
          $stage = Join-Path $env:RUNNER_TEMP "frogclaw-portable-${arch}"
          Remove-Item -LiteralPath $stage -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item -LiteralPath $exe -Destination $stage
          if (Test-Path -LiteralPath $resources) {
            Copy-Item -LiteralPath $resources -Destination $stage -Recurse
          }
          Compress-Archive -Path (Join-Path $stage "*") -DestinationPath $zipName

      - name: Upload Windows portable to release
        if: contains(matrix.target, 'windows')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          token: ${{ secrets.GITHUB_TOKEN }}
          files: FrogClaw_${{ github.ref_name }}_windows-*-portable.zip

  # ── Build for Linux ARM64 (cross-compile) ──────────────
  release-linux-arm:
    name: Build (aarch64-unknown-linux-gnu)
    needs: [check-version, draft-release-notes]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: 'v1'
          key: 'ubuntu-22.04-aarch64-unknown-linux-gnu'
          workspaces: src-tauri -> target

      - name: Setup cross-compilation sources
        run: |
          cat > /tmp/sources.list << 'EOF'
          deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu jammy main multiverse universe restricted
          deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu jammy-security main multiverse universe restricted
          deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu jammy-updates main multiverse universe restricted
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main multiverse universe restricted
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main multiverse universe restricted
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main multiverse universe restricted
          EOF
          sudo mv /etc/apt/sources.list /etc/apt/sources.list.bak
          sudo mv /tmp/sources.list /etc/apt/sources.list
          sudo dpkg --add-architecture arm64
          sudo apt-get update

      - name: Install ARM64 dependencies
        run: |
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libwebkit2gtk-4.1-dev:arm64 \
            libayatana-appindicator3-dev:arm64 \
            librsvg2-dev:arm64 \
            libssl-dev:arm64 \
            patchelf:arm64

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get linked dependency versions
        id: dep-versions
        run: |
          SM_SHA=$(git -C libs/stream-monaco rev-parse HEAD)
          MS_SHA=$(git -C libs/markstream-vue rev-parse HEAD)
          echo "cache-key=${{ runner.os }}-aarch64-unknown-linux-gnu-linked-deps-${SM_SHA:0:12}-${MS_SHA:0:12}" >> $GITHUB_OUTPUT

      - name: Cache linked dependencies
        id: cache-linked-deps
        uses: actions/cache@v4
        with:
          path: |
            libs/stream-monaco/node_modules
            libs/stream-monaco/dist
            libs/markstream-vue/node_modules
            libs/markstream-vue/packages/markdown-parser/node_modules
            libs/markstream-vue/packages/markdown-parser/dist
            libs/markstream-vue/packages/markstream-react/node_modules
            libs/markstream-vue/packages/markstream-react/dist
          key: ${{ steps.dep-versions.outputs.cache-key }}

      - name: Build linked dependencies
        if: steps.cache-linked-deps.outputs.cache-hit != 'true'
        run: |
          pnpm --dir libs/stream-monaco install --frozen-lockfile
          pnpm --dir libs/stream-monaco build

          pnpm --dir libs/markstream-vue install --frozen-lockfile
          pnpm --dir libs/markstream-vue run build:parser
          pnpm --dir libs/markstream-vue/packages/markstream-react build

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Codex app-server resource
        run: node scripts/prepare-codex-app-server.mjs aarch64-unknown-linux-gnu

      - name: Prepare claude-mem resource
        run: node scripts/prepare-claude-mem.mjs aarch64-unknown-linux-gnu

      - name: Build for Linux ARM64
        run: |
          export PKG_CONFIG_ALLOW_CROSS=1
          export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig/:$PKG_CONFIG_PATH
          export PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu/
          pnpm tauri build --target aarch64-unknown-linux-gnu --bundles deb,rpm
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Linux ARM64 artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'FrogClaw ${{ github.ref_name }}'
          draft: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/rpm/*.rpm

  # ── Publish draft release as latest ────────────────────
  publish-release:
    name: Publish Release
    needs: [release, release-linux-arm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── Upload release assets to frogclaw.com downloads ───
  upload-server:
    name: Upload Release Assets To Server
    needs: [publish-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir release-assets \
            --pattern '*'

      - name: Rewrite updater manifest URLs
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE_URL="https://frogclaw.com/downloads/frogclawclient/${VERSION}"

          if [ ! -f release-assets/latest.json ]; then
            echo "::error::latest.json was not found in release assets"
            exit 1
          fi

          jq --arg base "$BASE_URL" --arg version "$VERSION" '
            .notes = ("FrogClaw " + $version + " released.")
            | .platforms |= with_entries(
                .value.url = ($base + "/" + (.value.url | split("/") | last))
              )
          ' release-assets/latest.json > release-assets/latest.tmp.json
          mv release-assets/latest.tmp.json release-assets/latest.json

          echo "Updated latest.json:"
          cat release-assets/latest.json

      - name: Upload artifacts to Linux server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_REMOTE_DIR: ${{ secrets.DEPLOY_REMOTE_DIR }}
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ] || [ -z "$DEPLOY_PASSWORD" ] || [ -z "$DEPLOY_REMOTE_DIR" ]; then
            echo "::warning::DEPLOY_HOST, DEPLOY_USER, DEPLOY_PASSWORD, or DEPLOY_REMOTE_DIR not set, skipping server upload"
            exit 0
          fi

          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass >/dev/null 2>&1

          VERSION="${GITHUB_REF_NAME#v}"
          REMOTE_ROOT="${DEPLOY_REMOTE_DIR%/}"
          REMOTE_DIR="${REMOTE_ROOT}/${VERSION}"

          export SSHPASS="$DEPLOY_PASSWORD"
          SSH_OPTS="-o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null"

          sshpass -e ssh $SSH_OPTS "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${REMOTE_DIR}'"

          find release-assets -maxdepth 1 -type f -exec sshpass -e scp $SSH_OPTS {} "${DEPLOY_USER}@${DEPLOY_HOST}:${REMOTE_DIR}/" \;
          sshpass -e scp $SSH_OPTS release-assets/latest.json "${DEPLOY_USER}@${DEPLOY_HOST}:${REMOTE_ROOT}/latest.json"

          echo "Uploaded release ${VERSION} to ${DEPLOY_HOST}:${REMOTE_DIR}"

  # ── Deploy website after release ────────────────────────
  deploy-website:
    name: Deploy Website
    needs: [upload-server]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger website deployment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-website.yml',
              ref: 'main',
            });
