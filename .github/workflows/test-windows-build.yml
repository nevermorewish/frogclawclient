name: Test Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'test-windows-v*.*.*'

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build (x86_64-pc-windows-msvc)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Configure and update submodules
        shell: pwsh
        env:
          SUBMODULE_TOKEN: ${{ secrets.SUBMODULE_TOKEN || secrets.GH_PAT || github.token }}
        run: |
          if ($env:SUBMODULE_TOKEN) {
            Write-Host "::add-mask::$env:SUBMODULE_TOKEN"
            git config submodule.src-tauri/crates/open-agent-sdk.url "https://x-access-token:$env:SUBMODULE_TOKEN@github.com/frogclaw/open-agent-sdk-rust.git"
            git config submodule.libs/markstream-vue.url "https://x-access-token:$env:SUBMODULE_TOKEN@github.com/frogclaw/markstream-vue.git"
            git config submodule.libs/stream-monaco.url "https://x-access-token:$env:SUBMODULE_TOKEN@github.com/frogclaw/stream-monaco.git"
          } else {
            git config submodule.src-tauri/crates/open-agent-sdk.url "https://github.com/frogclaw/open-agent-sdk-rust.git"
            git config submodule.libs/markstream-vue.url "https://github.com/frogclaw/markstream-vue.git"
            git config submodule.libs/stream-monaco.url "https://github.com/frogclaw/stream-monaco.git"
          }

          git submodule sync --recursive
          git submodule update --init --recursive --depth 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: 'v1'
          key: 'windows-latest-x86_64-pc-windows-msvc'
          workspaces: src-tauri -> target

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get linked dependency versions
        id: dep-versions
        shell: bash
        run: |
          SM_SHA=$(git -C libs/stream-monaco rev-parse HEAD)
          MS_SHA=$(git -C libs/markstream-vue rev-parse HEAD)
          echo "cache-key=${{ runner.os }}-x86_64-pc-windows-msvc-linked-deps-${SM_SHA:0:12}-${MS_SHA:0:12}" >> $GITHUB_OUTPUT

      - name: Cache linked dependencies
        id: cache-linked-deps
        uses: actions/cache@v4
        with:
          path: |
            libs/stream-monaco/node_modules
            libs/stream-monaco/dist
            libs/markstream-vue/node_modules
            libs/markstream-vue/packages/markdown-parser/node_modules
            libs/markstream-vue/packages/markdown-parser/dist
            libs/markstream-vue/packages/markstream-react/node_modules
            libs/markstream-vue/packages/markstream-react/dist
          key: ${{ steps.dep-versions.outputs.cache-key }}

      - name: Build linked dependencies
        if: steps.cache-linked-deps.outputs.cache-hit != 'true'
        shell: bash
        run: |
          pnpm --dir libs/stream-monaco install --frozen-lockfile
          pnpm --dir libs/stream-monaco build

          pnpm --dir libs/markstream-vue install --frozen-lockfile
          pnpm --dir libs/markstream-vue run build:parser
          pnpm --dir libs/markstream-vue/packages/markstream-react build

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Disable updater artifacts when signing key is unavailable
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if ($env:TAURI_SIGNING_PRIVATE_KEY) {
            Write-Host "TAURI_SIGNING_PRIVATE_KEY is set; updater artifacts will be signed."
            exit 0
          }

          Write-Host "TAURI_SIGNING_PRIVATE_KEY is not set; disabling updater artifacts for this test build."
          node -e "const fs=require('fs'); const path='src-tauri/tauri.conf.json'; const c=JSON.parse(fs.readFileSync(path,'utf8')); c.bundle.createUpdaterArtifacts=false; fs.writeFileSync(path, JSON.stringify(c,null,2)+String.fromCharCode(10));"

      - name: Build with Tauri
        shell: pwsh
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target x86_64-pc-windows-msvc

      - name: Upload Windows build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FrogClawClient-windows-x64-${{ github.run_number }}
          if-no-files-found: error
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/FrogClawClient.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*setup.exe

      - name: Package Windows portable (zip)
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $exe = "src-tauri/target/x86_64-pc-windows-msvc/release/FrogClawClient.exe"
          $zipName = "FrogClawClient_${{ github.ref_name }}_windows-x64-portable.zip"
          Compress-Archive -Path $exe -DestinationPath $zipName

      - name: Upload Windows portable to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'FrogClawClient Test ${{ github.ref_name }}'
          draft: true
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            FrogClawClient_${{ github.ref_name }}_windows-x64-portable.zip
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*setup.exe
